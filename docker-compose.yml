services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadline-navigator
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - DISABLE_HMR=${DISABLE_HMR:-false}
    volumes:
      # Live-reload source changes from the host
      - .:/app
      # Don't overwrite the container node_modules with the host's
      - /app/node_modules
    command: npm run dev
